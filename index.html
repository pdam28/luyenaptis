ind by reading books on productivity and well-being.\n\nTOPIC 28: End- of- term project (dự án cuối kì)\n1. For end of term project, you need to choose at least 2 of these\n2. It needs to include relevant images and your own text about the topic (bài viết về chủ đề)\n3. Then you need to use images and written work to create a presentation. (tạo ra bài thuyết trình) \n4. Your presentation offer your key points (trình bày điểm chính) and you have around 5 minutes to talk\n5. After this time, other students are able to ask questions and you need to answer  \n\n\nREADING APTIS PART 4\n\nTOPIC 1: Music Festival (lễ hội âm nhạc)\nPerson A\nThis is my first time going to a concert, and the experience was quite mixed. During the first two days. The music was rather ordinary, and the event would have been far more enjoyable (thú vị) if there had been just a little sunshine (một ít nắng) to brighten things up. Luckily, the last day completely changed my impression, as I finally got to see my favorite singers. Meeting them and enjoying the performances made the whole trip memorable and truly special.\nPerson B\nI attend music festivals every year, and over time it has become something of a personal tradition. I really enjoy the energetic atmosphere where people come together to share music and excitement. This particular festival, however, felt quite different from what I am used to. The weather conditions were less than perfect, though it didn’t bother me that much, as I have enjoyed festivals in the rain before. The venue was moderately convenient and the performances themselves were rather unremarkable. To be honest, I doubt I will choose to come back in the future.\nPerson C\nI don’t like one particular type of music being played at festivals, as I much prefer a variety of genres to enjoy and dance to. Luckily, this event truly lived up to what I was hoping for. The songs and melodies were absolutely impresive (ấn tượng), leaving a strong impression on me. Although there was some rain, I actually felt it made the atmosphere even more vibrant and fun. One drawback, however, was the ticket price (giá vé) was quite high (cao), which many students, including me, found difficult to afford.\nPerson D\nMy band and I were invited to play at this festival, and we delivered the kind of performance our audience has come to expect from us. The show turned out to be truly memorable, not only because of the energy on stage but also because some of our former members and past collaborators were present. It felt great to reconnect (kết nối lại) with them and share stories after the performance. The atmosphere overall was very positive, and the crowd seemed to enjoy every moment. The only real challenge was that the venue was located quite far from the main road(đường chính), which made moving our instruments and equipment rather inconvenient.(bất tiện)\nQuestions:\n●\tWho is disappointed with the weather? A \n●\tWho was not impressed (ấn tượng) by the event overall? B\n●\tWho enjoyed all the music at the music event? C\n●\tWho thought the event was expensive (đắt đỏ)?C \n●\tWho likes meeting old friends? D\n●\tWho thought the location (địa điểm) was not good? D\n●\tWho enjoyed the final day (ngày cuối) =last day of the music event? A\nMUSIC FESTIVAL (VERSION 2)\nHere are four people's opinions about the same topic. Read carefully and answer the questions below.\nA: I went to the festival, but on the first day, I didn’t enjoy it much. It felt a bit dull and not very exciting. Still, the stage was bright with lights and fireworks, and the overall atmosphere was unforgettable. The music lifted my mood and made me feel truly happy. Interestingly, by the final day, everything seemed different—I began to enjoy it a lot more. In the end, I was really glad I decided to go.\nB: I’ve been to this festival every year, and of course, I joined again this time. But honestly, I didn’t enjoy the music, and the weather made things worse. It kept raining, turning the e he usually doesn't do much anyway. I will make specific plans for everyone in the neighborhood to follow so the park could be cleaned in no time.\nPERSON C\nThe park plays an important role in teaching children about responsibility through volunteering. Cleaning the local park not only helps keep the environment clean but also teaches kids the value of teamwork and dedication. We admire their efforts to protect nature, whether it's picking up trash or planting flowers. Volunteering is a great way for children to improve their skills and mindset while making a positive impact on Our community.\nPERSON D\nThis is a reminder that not just the park, but other areas in our town also need regular cleaning (2). Keeping our neighborhoods clean is important for a healthy environment. The community should work together to organize cleaning events more often (1), as ignoring trash can harm wildlife and make the area unpleasant. By joining these efforts, residents can take pride in their surroundings and make sure everyone has a nice place to enjoy.\n1. Who thinks the park is a beautiful place to relax? PERSON B1\n2. Who can't help because of busy life? PERSON A1\n3. Who will ask other people to help? PERSON B2\n4. Who thinks cleaning should happen regularly? PERSON D1\n5. Who thinks volunteering is important for children? PERSON C\n6. Who thinks other local areas need cleaning? PERSON D2\n7. Who thinks volunteering can help with future employment?A2\n\n\n\nPART 5: MATCHING HEADINGS\nTOPIC 1: THE ARRIVAL OF FOUR-DAY WEEK\nA way of life now outdated  \nBenefits for employees  \nUndesirable financial consequences  \nUnforeseen challenges for employees  \nDifficult to change old habits  \nAn unfair plan for some people  \nAlternative solutions worth considering  \nKey notes:  \noutdated → benefits → financial → challenges → difficult to loose → plan → alternative solutions  \nMnemonic Tip:  \nTuy có lối sống lỗi thời (outdated), nhưng mang lại lợi ích (benefits) cho tôi về tài chính (financial). Để đạt được điều đó, tôi phải vượt qua những thách thức (challenges) vô cùng khó khăn mới thay đổi được (difficult to change) thói quen cũ. Bước đầu, tôi lên một kế hoạch (plan) rõ ràng và tìm kiếm các giải pháp thay thế (alternative solutions) để cân bằng giữa công việc và cuộc sống.\nTOPIC 2: MOUNTAIN SUMMITS\nOur changing definition of mountains  \nA sense of achievement  \nPublicising one's achievements  \nA disturbing revelation  \nThe wrong priority  \nA focus on substantiality  \nA more intimate relationship  \n\nKey notes:  \nchanging definition → sense of achievement → publicising → disturbing revelation → wrong priority → substantiality → intimate relationship  \nMnemonic Tip:  \nThay đổi định nghĩa (changing definition) về núi cũng như leo đỉnh ở đâu cũng có cảm giác thành công (sense of achievement), nên tôi hay khoe khoang (publicising) thành tích. Nhưng rồi một tin xấu (disturbing revelation) ập đến do tôi đã đặt ưu tiên sai (wrong priority) leo đỉnh rồi checkin. Giờ đây, tôi tập trung vào thực chất (substantiality) và xây dựng mối quan hệ gần gũi (intimate relationship) hơn với thiên nhiên, thay vì chỉ chụp ảnh check-in.\n\nTOPIC 3: WOMEN IN MATHEMATICS\nGender obscure achievements  \nAcknowledging achievement of a pioneer  \nMan unfairly credited  \nA long career showing exceptional ability  \nLabels can change perspective on people  \nAttempting to create a gender balance  \nUniformity is not always beneficial  \nKey notes:  \ngender obscure → acknowledging →  unfairly credited → long career → labels→ gender balance → uniformity  \nMnemonic Tip:  \nThành tựu của cô ấy bị giới tính che mờ (gender obscure), trong khi người đàn ông không cần làm quá nhiều lại được ghi nhận bất công (unfairly credited) thành công. Dù có sự nghiệp lâu dài (long career) đầy tài năng, cô vẫn bị dán nhãn (labels) định kiến. Vì vậy, tôi quyết tâm công nhận người tiên phong (acknowledging pioneer), thúc đẩy cân bằng giới (gender balance) và hiểu rằng sự đồng nhất (uniformity) không phải lúc nào cũng tốt đẹp.\n TOPIC 4: URBAN DEVELOPMENT\nRedefining sustainable city planning  \nEncouraging green spaces in urban areas  \nSupporting affordable housing projects  \nOver-reliance on high-rise buildings  \nConcerns about traffic congestion  \nStrengthening community engagement  \nFocusing on renewable energy sources  \nKey notes:  \nsustainable planning → green spaces → affordable housing → over-reliance → traffic congestion → community engagement → renewable energy  \nMnemonic Tip:  \nTôi mơ về quy hoạch thành phố bền vững (sustainable planning) với nhiều không gian xanh (green spaces) và nhà ở giá rẻ (affordable housing). Nhưng rồi tôi thấy thành phố quá phụ thuộc (over-reliance) vào nhà cao tầng, gây tắc nghẽn giao thông (traffic congestion) nghiêm trọng. Tôi bắt đầu kêu gọi sự tham gia của cộng đồng (community engagement) và chuyển hướng sang năng lượng tái tạo (renewable energy) để cứu lấy tương lai đô thị.\nTOPIC 5: DIGITAL TRANSFORMATION\nRedefining business models with technology  \nEnhancing productivity through automation  \nPromoting digital skills training  \nOver-reliance on automated systems  \nConcerns about cybersecurity risks  \nBuilding inclusive digital ecosystems  \nFocusing on ethical technology development  \nKey notes:  \nbusiness models → productivity → digital skills → over-reliance → cybersecurity → inclusive ecosystems → ethical development  \nMnemonic Tip:  \nCông nghệ giúp tôi đổi mới mô hình kinh doanh (business models), tăng năng suất (productivity) và học kỹ năng số (digital skills) mỗi ngày. Nhưng vì quá phụ thuộc (over-reliance) vào hệ thống tự động, tôi suýt mất dữ liệu do rủi ro an ninh mạng (cybersecurity). Từ đó, tôi xây dựng hệ sinh thái bao trùm (inclusive ecosystems) và cam kết phát triển công nghệ có đạo đức (ethical development).\nTOPIC 6: WELLNESS TREND\nRedefining holistic health approaches  \nPromoting mental health awareness  \nEncouraging community fitness programs  \nOveremphasis on trendy diets  \nConcerns about wellness misinformation  \nBuilding supportive health communities  \nFocusing on sustainable lifestyle changes  \nKey notes:  \nholistic health → mental health → community fitness → trendy diets → misinformation → supportive communities → sustainable lifestyle  \nMnemonic Tip:  \nTôi theo đuổi sức khỏe toàn diện (holistic health), chú trọng sức khỏe tâm thần (mental health) và tham gia thể dục cộng đồng (community fitness). Nhưng tôi từng sa đà vào chế độ ăn theo mốt (trendy diets) và tin vào thông tin sai lệch (misinformation) trên mạng. Giờ đây, tôi xây cộng đồng hỗ trợ (supportive communities) và tập trung vào thay đổi lối sống bền vững (sustainable lifestyle)—không chạy theo trend nữa.\nTOPIC 7: CULTURAL EXCHANGE\nRedefining Global Cultural Understanding  \nEncouraging Cross-Cultural Festivals  \nPromoting Language Exchange Programs  \nOveremphasis on Commercial Tourism  \nConcerns About Cultural Preservation  \nBuilding Mutual Respect Among Communities  \nFocusing on Authentic Cultural Experiences  \nKey notes:  \nglobal understanding → cross-cultural festivals → language exchange → commercial tourism → cultural preservation → mutual respect → authentic Cultural experiences  \nMnemonic Tip:  \nTôi muốn mở rộng hiểu biết văn hóa toàn cầu (global understanding) qua lễ hội giao lưu (cross-cultural festivals) và trao đổi ngôn ngữ (language exchange). Nhưng tôi nhận ra du lịch thương mại (commercial tourism) đang làm mai một bản sắc. Vì vậy, tôi ưu tiên trải nghiệm văn hóa chân thực (authentic Cultural experiences), góp phần bảo tồn di sản (cultural preservation) và xây dựng tôn trọng lẫn nhau (mutual respect) giữa các dân tộc.\n TOPIC 8: WOMAN MATHEMATICS (Ver 2)\n Breaking New Ground in Ancient Mathematics\nTrailblazing Computer Science\nDriving Space Exploration Forward\nTransforming Geometry and Motion\nConnecting Symmetry to Physics\nEncouraging Diversity in STEM\nBreaking Through Educational Barriers\nKey notes:\nAncient Mathematics (1) → Computer Science (4) → Space Exploration (6) → Geometry and Motion (3) → Symmetry and Physics (2) → Diversity in STEM (5) → Educational Barriers (7)\nMnemonic Tip:\nMọi kiến thức bắt nguồn từ nền tảng Toán học cổ đại (Ancient Mathematics), tạo tiền đề cho sự ra đời của Khoa học máy tính (Computer Science). Nhờ sức mạnh của máy tính, con người bắt đầu dấn thân vào công cuộc Khám phá vũ trụ (Space Exploration). Để tàu bay đúng hướng, chúng ta phải làm chủ các quy luật Hình học và Chuyển động (Geometry and Motion), đồng thời thấu hiểu sự Đối xứng và Vật lý (Symmetry and Physics) của vạn vật. Tuy nhiên, khoa học không chỉ là những con số, mà cần sự Đa dạng trong STEM (Diversity in STEM) để cùng nhau đập tan mọi Rào cản giáo dục (Educational Barriers) trên toàn thế giới.\nTOPIC 9: MOUNTAINS (VERSION 2) \nChanging the definition of mountain \nThe unique feeling of achievement\nPublicity of achievement \nThe wrong priority\nA disturbing relevance \nFocus on sustainability \nA more intimate relationship \nMnemonic Tip (Mẹo nhớ theo thứ tự mới):\nĐể nhớ được chuỗi này, bạn hãy tưởng tượng một hành trình leo núi từ lúc bắt đầu đến khi kết thúc:\nChúng ta bắt đầu bằng việc Thay đổi định nghĩa (1) về leo núi, không còn là chinh phục đỉnh cao mà là tìm kiếm Cảm giác thành tựu độc bản (5) trong tâm hồn. Thay vì mải mê Quảng bá thành tích (3) lên mạng xã hội, ta nhận ra đó là Một sự ưu tiên sai lầm (4). Điều này dẫn đến Một thực trạng đáng lo ngại (6) về môi trường, buộc chúng ta phải Tập trung vào sự bền vững (2) để xây dựng Một mối quan hệ gần gũi (7) và chân thực hơn với thiên nhiên.";
const state = { tab:'dashboard', p1Topic:null, p4:null, p4TopicIndex:null, p4QuestionIndex:null, p4Correct:{}, p23:null, p23Index:null, p5:null, p5Index:null, exam:[], examIndex:0, examScore:0 };
function clean(s){return (s||'').replace(/\s+/g,' ').trim()}
function linesBetween(start, end){ const a=RAW.indexOf(start); const b=end?RAW.indexOf(end,a+1):RAW.length; return RAW.slice(a<0?0:a,b<0?RAW.length:b); }
function parsePart1(){
 const sec=linesBetween('Part 1:', 'Part 2:');
 const blocks=sec.split(/\n(?=\d+\.\s)/).filter(x=>/^\d+\./.test(x.trim()));
 return blocks.map(b=>{let ls=b.split('\n').map(clean).filter(Boolean); let m=ls[0].match(/^(\d+)\.\s*(.+)$/); return {id:m?m[1]:'', bank:m?m[2]:'', text:ls.slice(1).join('\n')};}).filter(x=>x.bank);
}
function parsePart23(){
 const sec=linesBetween('Part 2:', 'READING APTIS PART 4');
 const parts=sec.split(/\n(?=TOPIC\s*\d+|Topic\s*\d+|TOPIC:)/i).filter(x=>/TOPIC/i.test(x));
 const out=[];
 for(const b of parts){
   const ls=b.split('\n').map(clean).filter(Boolean);
   const title=ls[0].replace(/^TOPIC/i,'Topic');
   const sentences=[];
   for(const l of ls){const m=l.match(/^([1-5])\.\s*(.+)$/); if(m) sentences.push(m[2]);}
   if(sentences.length>=5) out.push({title, sentences});
 }
 return out;
}
function extractAnswer(line){
 let s=clean(line).replace(/[。.]$/,'');
 let m=s.match(/^(Who.+?\?)\s*(?:-|–)?\s*(?:Person|PERSON)?\s*([A-D])\d?\s*$/i);
 if(m) return {q:clean(m[1]), ans:m[2].toUpperCase()};
 m=s.match(/^(Who.+?)\s*(?:-|–)?\s*(?:Person|PERSON)\s*([A-D])\d?\s*$/i);
 if(m) return {q:clean(m[1].replace(/[:：]$/,'?')), ans:m[2].toUpperCase()};
 return null;
}
function parsePart4(){
 const sec=linesBetween('READING APTIS PART 4', 'PART 5:');
 const blocks=sec.split(/\n(?=(?:TOPIC|Topic|MUSIC FESTIVAL|EXTREME SPORT)\b)/).filter(x=>/Person|PERSON|A:/.test(x)&&/Who/i.test(x));
 const topics=[];
 for(const b of blocks){
   const ls=b.split('\n').map(x=>x.trim()).filter(Boolean);
   const title=clean(ls[0]).slice(0,90);
   const qs=[]; const ctx=[];
   for(const l of ls){ const qa=extractAnswer(l); if(qa) qs.push(qa); else if(!/^(Questions:|Suggestion:|Read the four opinions|Here are four people's|Here is the perspective)/i.test(l)) ctx.push(l); }
   if(qs.length) topics.push({title, context:ctx.join('\n'), questions:qs});
 }
 return topics;
}
function parsePart5(){
 const sec=linesBetween('PART 5:', null);
 const blocks=sec.split(/\n(?=TOPIC\s*\d+)/i).filter(x=>/^TOPIC/i.test(x.trim()));
 const topics=[];
 for(const b of blocks){
  const ls=b.split('\n').map(clean).filter(Boolean); const title=ls[0]; let heads=[];
  for(let i=1;i<ls.length;i++){ if(/^Key notes|Mnemonic|Mẹo/i.test(ls[i])) break; if(!/^TOPIC/i.test(ls[i])) heads.push(ls[i]); }
  heads=heads.filter(h=>h.length>5 && !h.includes('→'));
  if(heads.length>=5) topics.push({title, headings:heads});
 }
 return topics;
}

function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(a){a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function save(k,v){localStorage.setItem('aptis_'+k,JSON.stringify(v))} function load(k,d){try{return JSON.parse(localStorage.getItem('aptis_'+k))??d}catch{return d}}

function markCompleted(part,idx){

}
function resetCompleted(part){

function availableIndexes(part,total){
 const done=getCompleted(part);
 return Array.from({length:total},(_,i)=>i).filter(i=>!done.includes(i));
}
function randomAvailableIndex(part,total){
 const av=availableIndexes(part,total);
 if(!av.length) return null;
 return av[Math.floor(Math.random()*av.length)];
}
function nextAvailableIndex(part,total,current){
 const av=availableIndexes(part,total);
 if(!av.length) return null;
 for(let step=1; step<=total; step++){
   const n=(current+step+total)%total;
   if(av.includes(n)) return n;
 }
 return av[0];
}

function escapeHTML(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function p1Words(x){return x.bank.split('-').map(w=>clean(w).toLowerCase()).filter(Boolean)}
function p1Lines(x){
 const raw=x.text.replace(/\n/g,'\n').trim();
 let ls=raw.split(/\n+/).map(clean).filter(Boolean);
 if(ls.length>=5) return ls.slice(0,5);
 const m=raw.match(/[^.!?]+[.!?]+/g);
 if(m&&m.length>=5) return m.map(clean).slice(0,5);
 return raw.split(/(?<=[.!?])\s+/).map(clean).filter(Boolean).slice(0,5);
}
function replaceWordWithSelect(sentence, word, i, opts, disabled=false){
 const re=new RegExp('\\b'+word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
 const select=`<select class="gapSelect" data-answer="${escapeHTML(word)}" id="p1gap_${i}" ${disabled?'disabled':''}>${disabled?`<option value="${escapeHTML(word)}" selected>${escapeHTML(word)}</option>`:`<option value="">---</option>${opts.map(o=>`<option value="${escapeHTML(o)}">${escapeHTML(o)}</option>`).join('')}`}</select>`;
 if(re.test(sentence)) return escapeHTML(sentence).replace(re, select);
 return select + ' ' + escapeHTML(sentence);
}

   markCompleted('p1', state.p1Topic.idx);
 }
 document.getElementById('p1Result').innerHTML=`${full?'✅ Chính xác 100%! Topic này sẽ không lặp lại nữa.':'❌ Chưa đúng.'} Bạn đúng <b>${ok}/${total}</b> ô cần chọn.`;
 document.getElementById('p1Answer').classList.add('show');
}


function part1(){
 const idx=state.p1Topic?.idx;
 if(idx===null || idx===undefined) return allDoneCard('p1','Part 1',DATA.p1.length);
 const x=DATA.p1[idx];
 const words=p1Words(x);
 const opts=words;
 const lines=p1Lines(x);
 const body=lines.map((s,i)=>`<p class="readingLine">${replaceWordWithSelect(s, words[i]||'', i, opts, i===0)}</p>`).join('');
 const available=availableIndexes('p1',DATA.p1.length);
 return `<section class="card aptisPart1"><div class="row"><div><p class="small muted" style="margin:0">Reading</p><h2 style="margin:4px 0 0">Question ${idx+1} of ${DATA.p1.length}</h2><p class="muted">Còn lại: ${available.length}/${DATA.p1.length} topic chưa hoàn thành 100%</p></div><button class="btn secondary" onclick="newP1();render()">Đề ngẫu nhiên chưa làm đúng</button></div><p><b>Read the text. Choose one word from the list for each gap. The first one is done for you.</b></p><div class="wordBank"><b>Word list:</b> ${words.map(w=>`<span class="badge">${escapeHTML(w)}</span>`).join('')}</div><div class="readingBox">${body}</div><div class="controls"><button class="btn good" onclick="checkP1()">Kiểm tra Part 1</button><button class="btn secondary" onclick="state.p1Topic=null;render()">Làm câu khác chưa đúng 100%</button><button class="btn secondary" onclick="resetCompleted('p1')">Reset Part 1</button><select onchange="chooseP1(this.value)">${available.map(i=>`<option value="${i}" ${i===idx?'selected':''}>Question ${i+1}: ${escapeHTML(DATA.p1[i].bank)}</option>`).join('')}</select></div><div id="p1Result" style="font-weight:800;margin-top:12px"></div><div class="answerBox" id="p1Answer"><b>Đáp án:</b> ${words.map((w,i)=>`${i+1}. ${escapeHTML(w)}`).join(' &nbsp; ')}</div></section>`;
}

function loadP23Topic(index){
 state.p23Index=index;
 const t=DATA.p23[index];
 state.p23={...t, order:shuffle(t.sentences), picked:[]};
}

function newP23(){
 const index=randomAvailableIndex('p23',DATA.p23.length);
 if(index===null){ state.p23=null; state.p23Index=null; return; }
 loadP23Topic(index);
}

function restartP23(){
 if(state.p23Index===null || state.p23Index===undefined){ newP23(); return; }
 loadP23Topic(state.p23Index);
}
function chooseP23Topic(index){
 loadP23Topic(Number(index));
 render();
}

function nextP23Topic(){
 let idx = state.p23Index;
 if(idx===null || idx===undefined) idx = -1;
 const next=nextAvailableIndex('p23',DATA.p23.length,idx);
 if(next===null){ state.p23=null; state.p23Index=null; render(); return; }
 loadP23Topic(next);
 render();
}

function pickSent(i){
 const s=state.p23.order[i];
 if(state.p23.picked.includes(s))return;
 state.p23.picked.push(s);
 render();
}
function removePicked(i){
 state.p23.picked.splice(i,1);
 render();
}
function undoP23(){
 state.p23.picked.pop();
 render();
}
function resetP23(){
 state.p23.picked=[];
 render();
}

function checkP23(){
 if(state.p23.picked.length<state.p23.sentences.length){
   alert('Bạn chưa chọn đủ 5 câu nhé.');
   return;
 }
 const ok=state.p23.sentences.every((s,i)=>state.p23.picked[i]===s);
 if(ok && state.p23Index!==null && state.p23Index!==undefined){
   markCompleted('p23', state.p23Index);
 }
 alert(ok?'Đúng 100%! Topic này sẽ không lặp lại nữa.':'Chưa đúng. Bạn có thể bấm vào câu đã chọn để bỏ ra và chọn lại.');
 document.getElementById('ansP23')?.classList.add('show');
}


function part23(){
 if(!state.p23) return allDoneCard('p23','Part 2/3',DATA.p23.length);
 const t=state.p23;
 const available=availableIndexes('p23',DATA.p23.length);
 return `<section class="card"><div class="row"><h2>Part 2/3: ${t.title}</h2><span class="badge">Chọn theo thứ tự 1 → 5</span><span class="badge">Còn lại: ${available.length}/${DATA.p23.length}</span></div><div class="controls"><label><b>Đang làm topic:</b> <select onchange="chooseP23Topic(this.value)">${available.map(i=>`<option value="${i}" ${i===state.p23Index?'selected':''}>${i+1}. ${DATA.p23[i].title}</option>`).join('')}</select></label></div><p class="muted">Topic nào làm đúng 100% sẽ được đánh dấu hoàn thành và không xuất hiện lại trong danh sách luyện.</p><div class="grid"><div><h3>Các câu đang xáo trộn trong topic này</h3>${t.order.map((s,i)=>`<div class="sentence ${t.picked.includes(s)?'done':''}" onclick="pickSent(${i})">${s}</div>`).join('')}</div><div><h3>Thứ tự bạn chọn</h3>${t.picked.map((s,i)=>`<div class="sentence selected" title="Bấm để bỏ câu này" onclick="removePicked(${i})"><b>${i+1}.</b> ${s}<br><small>↩ Bấm để bỏ chọn</small></div>`).join('')||'<p class="muted">Chưa chọn câu nào.</p>'}</div></div><div class="controls"><button class="btn good" onclick="checkP23()">Kiểm tra</button><button class="btn secondary" onclick="undoP23()">Hoàn tác 1 câu</button><button class="btn secondary" onclick="resetP23()">Xóa chọn lại</button><button class="btn secondary" onclick="restartP23();render()">Làm lại topic này</button><button class="btn secondary" onclick="nextP23Topic()">Topic tiếp theo chưa hoàn thành</button><button class="btn secondary" onclick="newP23();render()">Topic ngẫu nhiên chưa hoàn thành</button><button class="btn secondary" onclick="resetCompleted('p23')">Reset Part 2/3</button></div><div class="answerBox" id="ansP23"><b>Đáp án đúng của ${t.title}:</b><ol>${t.sentences.map(s=>`<li>${s}</li>`).join('')}</ol></div></section>`;
}

function loadP4Question(topicIndex, questionIndex){
 const topic = DATA.p4[topicIndex];
 const q = topic.questions[questionIndex];
 state.p4TopicIndex = topicIndex;
 state.p4QuestionIndex = questionIndex;
 state.p4 = {...q, title:topic.title, context:topic.context};
}

function newP4(){
 const topicIndex = randomAvailableIndex('p4',DATA.p4.length);
 if(topicIndex===null){ state.p4=null; state.p4TopicIndex=null; state.p4QuestionIndex=null; return; }
 loadP4Question(topicIndex, 0);
}


function chooseP4(ans){
 const q=state.p4;
 document.querySelectorAll('#part4Box .option').forEach(btn=>{
   const a=btn.dataset.ans;
   btn.disabled=true;
   if(a===q.ans)btn.classList.add('correct');
   if(a===ans&&ans!==q.ans)btn.classList.add('wrong');
 });
 const st=load('p4',{right:0,total:0});
 st.total++;
 const correct=ans===q.ans;
 if(correct)st.right++;
 save('p4',st);
 if(correct){
   const key=String(state.p4TopicIndex);
   if(!state.p4Correct[key]) state.p4Correct[key]=[];
   if(!state.p4Correct[key].includes(state.p4QuestionIndex)) state.p4Correct[key].push(state.p4QuestionIndex);
   if(state.p4Correct[key].length>=DATA.p4[state.p4TopicIndex].questions.length){
     markCompleted('p4', state.p4TopicIndex);
     document.getElementById('p4Result').innerHTML='✅ Chính xác! Bạn đã hoàn thành đúng 100% topic này. Bấm sang topic tiếp theo để tiếp tục.';
     return;
   }
 }
 document.getElementById('p4Result').innerHTML=correct?'✅ Chính xác!':'❌ Sai rồi. Đáp án đúng là '+q.ans;
}


function nextP4Question(){
 let ti = state.p4TopicIndex;
 let qi = state.p4QuestionIndex;
 if(ti===null || ti===undefined){ newP4(); render(); return; }
 const total = DATA.p4[ti].questions.length;
 if(isCompleted('p4',ti) || qi + 1 >= total){
   const nextTopic = nextAvailableIndex('p4',DATA.p4.length,ti);
   if(nextTopic===null){ state.p4=null; state.p4TopicIndex=null; state.p4QuestionIndex=null; render(); return; }
   loadP4Question(nextTopic, 0);
   render();
   setTimeout(()=>alert('Đã chuyển sang topic tiếp theo chưa hoàn thành!'), 50);
   return;
 }
 loadP4Question(ti, qi + 1);
 render();
}

function randomP4QuestionSameTopic(){
 let ti = state.p4TopicIndex;
 if(ti===null || ti===undefined){ newP4(); render(); return; }
 const total = DATA.p4[ti].questions.length;
 let qi = Math.floor(Math.random()*total);
 if(total>1 && qi===state.p4QuestionIndex) qi = (qi+1)%total;
 loadP4Question(ti, qi);
 render();
}
function randomP4Topic(){
 newP4();
 render();
}
function chooseP4(ans){const q=state.p4; document.querySelectorAll('#part4Box .option').forEach(btn=>{const a=btn.dataset.ans; btn.disabled=true; if(a===q.ans)btn.classList.add('correct'); if(a===ans&&ans!==q.ans)btn.classList.add('wrong')}); const st=load('p4',{right:0,total:0}); st.total++; if(ans===q.ans)st.right++; save('p4',st); document.getElementById('p4Result').innerHTML=ans===q.ans?'✅ Chính xác!':'❌ Sai rồi. Đáp án đúng là '+q.ans;}
function formatP4Context(raw){
 const text = raw || '';
 const parts = [];
 const re = /(?:^|\n)\s*(Person\s+|PERSON\s+)?([ABCD])\s*[:\n]/g;
 let matches = [...text.matchAll(re)];
 if(matches.length>=4){
   for(let i=0;i<matches.length;i++){
     const label = matches[i][2];
     const start = matches[i].index + matches[i][0].length;
     const end = i+1<matches.length ? matches[i+1].index : text.length;
     const body = text.slice(start,end).trim();
     parts.push({label, body});
   }
 }else{
   const blocks = text.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean);
   for(let i=0;i<Math.min(4,blocks.length);i++){
     parts.push({label:['A','B','C','D'][i], body:blocks[i].replace(/^Person\s+[ABCD]\s*:?\s*/i,'')});
   }
 }
 if(parts.length){
   return `<div class="p4Topic"><div class="topicTitle">Topic: ${state.p4.title}</div>${parts.map(p=>`<div class="personCard"><div class="personName">Person ${p.label}</div><div class="personText">${p.body}</div></div>`).join('')}</div>`;
 }
 return `<div class="context">${text}</div>`;
}

function part4(){
 if(!state.p4) return allDoneCard('p4','Part 4',DATA.p4.length);
 const q=state.p4;
 const st=load('p4',{right:0,total:0});
 const topic=DATA.p4[state.p4TopicIndex]||DATA.p4[0];
 const available=availableIndexes('p4',DATA.p4.length);
 const key=String(state.p4TopicIndex);
 const correctCount=(state.p4Correct[key]||[]).length;
 const isLastP4Question=(state.p4QuestionIndex+1)>=topic.questions.length || isCompleted('p4',state.p4TopicIndex);
 const nextLabel=isLastP4Question?'Sang topic tiếp theo chưa hoàn thành':'Câu tiếp theo trong topic này';
 return `<section class="card" id="part4Box"><div class="row"><h2>Part 4: Chọn A/B/C/D</h2><span class="badge">${q.title}</span><span class="badge">Câu ${state.p4QuestionIndex+1}/${topic.questions.length}</span><span class="badge">Topic đúng: ${correctCount}/${topic.questions.length}</span><span class="badge">Còn lại: ${available.length}/${DATA.p4.length}</span><span class="badge">Điểm: ${st.right}/${st.total}</span></div><div class="controls"><label><b>Đang làm topic:</b> <select onchange="chooseP4Topic(this.value)">${available.map(i=>`<option value="${i}" ${i===state.p4TopicIndex?'selected':''}>${i+1}. ${DATA.p4[i].title}</option>`).join('')}</select></label></div><p class="muted">Part 4 sẽ giữ nguyên topic hiện tại. Topic nào làm đúng 100% toàn bộ câu hỏi sẽ không xuất hiện lại.</p><div class="context">${formatP4Context(q.context)}</div><div class="question">${q.q}</div>${['A','B','C','D'].map(a=>`<button class="option" data-ans="${a}" onclick="chooseP4('${a}')">Person ${a}</button>`).join('')}<div id="p4Result" style="font-weight:800;margin-top:12px"></div><div class="controls"><button class="btn secondary" onclick="nextP4Question()">${nextLabel}</button><button class="btn secondary" onclick="randomP4QuestionSameTopic()">Câu ngẫu nhiên trong topic này</button><button class="btn secondary" onclick="randomP4Topic()">Topic ngẫu nhiên chưa hoàn thành</button><button class="btn secondary" onclick="resetCompleted('p4')">Reset Part 4</button></div></section>`;
}
function newP5(){
 const index=Math.floor(Math.random()*DATA.p5.length);
 loadP5Topic(index);
}
function chooseP5Topic(index){
 loadP5Topic(Number(index));
 render();
}
function setP5Answer(i,val){
 state.p5.selected[i]=val;
}
function checkP5(){
 const p=state.p5;
 let correct=0;
 let html='';
 for(let i=0;i<p.answers.length;i++){
   const chosen = Number(p.selected[i]);
   const ok = chosen===p.answers[i];
   if(ok) correct++;
   html += `<div class="p5ResultLine">${ok?'✅':'❌'} Đoạn ${i+1}: ${ok?'Đúng':'Sai'}${ok?'':` — Đáp án đúng: ${p.headings[p.answers[i]]}`}</div>`;
 }
 document.getElementById('p5Result').innerHTML = `<h3>Kết quả: ${correct}/${p.answers.length}</h3>` + html;
}
function resetP5(){
 state.p5.selected=Array(state.p5.paragraphs.length).fill('');
 render();
}
function nextP5Topic(){
 let idx=state.p5Index;
 if(idx===null || idx===undefined) idx=-1;
 loadP5Topic((idx+1)%DATA.p5.length);
 render();
}
function part5(){const p=state.p5; return `<section class="card"><div class="row"><h2>Part 5: Matching headings</h2><span class="badge">Topic ${state.p5Index+1}/${DATA.p5.length}</span></div><div class="controls"><label><b>Đang làm topic:</b> <select onchange="chooseP5Topic(this.value)">${DATA.p5.map((x,i)=>`<option value="${i}" ${i===state.p5Index?'selected':''}>${i+1}. ${x.title}</option>`).join('')}</select></label></div><p class="muted"><b>Read the passage quickly.</b> Choose a heading for each numbered paragraph from the drop-down box. There is one more heading than you need.</p><h1>${p.title}</h1><details open><summary><h3 style="display:inline">Headings</h3></summary><div class="p5HeadingList">${p.headings.map((h,i)=>`<div class="p5HeadingItem">${String.fromCharCode(65+i)}. ${h}</div>`).join('')}<div class="p5HeadingItem">${String.fromCharCode(65+p.headings.length)}. Extra heading / Heading dư</div></div></details><div>${p.paragraphs.map((txt,i)=>`<div class="p5Paragraph"><div class="p5ParaTop"><span class="p5ParaNo">${i+1}.</span><select onchange="setP5Answer(${i},this.value)"><option value="">-- Chọn heading --</option>${p.headings.concat(['Extra heading / Heading dư']).map((h,j)=>`<option value="${j}" ${String(j)===String(p.selected[i])?'selected':''}>${String.fromCharCode(65+j)}. ${h}</option>`).join('')}</select></div><div class="p5ParaText"><b>${i+1}.</b> ${txt}</div></div>`).join('')}</div><div class="controls"><button class="btn good" onclick="checkP5()">Kiểm tra Part 5</button><button class="btn secondary" onclick="resetP5()">Làm lại topic này</button><button class="btn secondary" onclick="nextP5Topic()">Topic tiếp theo</button><button class="btn secondary" onclick="newP5();render()">Topic ngẫu nhiên</button></div><div id="p5Result"></div></section>`}
function startExam(){ const p4=shuffle(allP4).slice(0,12).map(x=>({...x,type:'p4'})); const p5=shuffle(allP5).slice(0,8).map(x=>({...x,type:'p5', opts:shuffle([x.ans,...shuffle(DATA.p5.map(t=>t.title).filter(t=>t!==x.ans)).slice(0,3)])})); state.exam=shuffle([...p4,...p5]); state.examIndex=0; state.examScore=0; }
function answerExam(ans){ const q=state.exam[state.examIndex]; if(ans===q.ans) state.examScore++; state.examIndex++; render(); }
function exam(){ if(state.examIndex>=state.exam.length) return `<section class="card"><h2>Kết quả bài tổng hợp</h2><div class="stat"><b>${state.examScore}/${state.exam.length}</b><br>Số câu đúng</div><div class="controls"><button class="btn" onclick="startExam();render()">Làm đề mới</button></div></section>`; const q=state.exam[state.examIndex]; if(q.type==='p4') return `<section class="card"><div class="row"><h2>Câu ${state.examIndex+1}/${state.exam.length}</h2><span class="badge">Part 4</span><span class="badge">${q.title}</span></div><details><summary><b>Xem đoạn đọc</b></summary><div class="context">${q.context}</div></details><div class="question">${q.q}</div>${['A','B','C','D'].map(a=>`<button class="option" onclick="answerExam('${a}')">Person ${a}</button>`).join('')}</section>`; return `<section class="card"><div class="row"><h2>Câu ${state.examIndex+1}/${state.exam.length}</h2><span class="badge">Part 5</span></div><p class="muted">Heading:</p><div class="question">“${q.heading}”</div>${q.opts.map(o=>`<button class="option" onclick="answerExam('${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</section>`; }
function go(t){state.tab=t; render()} function toggle(id){document.getElementById(id).classList.toggle('show')} document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>go(b.dataset.tab)); render();
</script>
